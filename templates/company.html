<h2>Company Details</h2>

<form method="POST">

<input type="text"
name="name"
value="{{ company[1] }}"
placeholder="Company Name">

<br><br>

<input type="text"
name="address"
value="{{ company[2] }}"
placeholder="Address">

<br><br>

<input type="text"
name="gstin"
value="{{ company[3] }}"
placeholder="GSTIN">

<br><br>

<input type="text"
name="phone"
value="{{ company[4] }}"
placeholder="Phone">

<br><br>

<button type="submit">
Save
</button>

</form>
